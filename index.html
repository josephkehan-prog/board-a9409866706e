<!DOCTYPE html><script type="application/json" id="cowork-artifact-meta">
{
  "name": "Jhan Email Kanban",
  "schemaVersion": 1,
  "description": "Kanban board of tasks extracted from Outlook mail. Tasks and statuses are stored in Supabase behind a real login (Supabase Auth) — no task data is baked into this HTML, so it is safe to host on a public URL. Three columns: To Do, Completed, Not for Me.",
  "mcpTools": [],
  "mcpServerNames": []
}
</script>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Email Task Board — jhan</title>
<style>
:root { color-scheme: light; }
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: #f0f2f5;
  color: #111;
  min-height: 100vh;
  padding: max(16px, env(safe-area-inset-top)) clamp(12px, 3vw, 24px) 48px;
}
header { margin-bottom: 14px; }
header h1 { font-size: clamp(0.98rem, 2.6vw, 1.12rem); font-weight: 700; color: #1a1a1a; line-height: 1.3; }
header .meta { font-size: 0.76rem; color: #888; margin-top: 4px; }
.signout { color: #6366f1; text-decoration: none; font-weight: 600; }
.signout:hover { text-decoration: underline; }

/* Login */
#login {
  position: fixed; inset: 0; z-index: 1000;
  background: #f0f2f5;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.login-box {
  background: #fff; border-radius: 14px; padding: 28px 26px;
  box-shadow: 0 6px 24px rgba(0,0,0,0.10);
  width: 100%; max-width: 340px; text-align: center;
  display: flex; flex-direction: column;
}
.login-title { font-size: 1.15rem; font-weight: 700; margin-bottom: 4px; }
.login-sub { font-size: 0.82rem; color: #888; margin-bottom: 18px; }
.login-box input {
  width: 100%; font-size: 1rem; padding: 11px 12px;
  border: 1px solid #d8dadf; border-radius: 9px; outline: none; margin-bottom: 10px;
}
.login-box input:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
.login-btn {
  width: 100%; font-size: 0.95rem; font-weight: 600; padding: 11px;
  border: none; border-radius: 9px; background: #6366f1; color: #fff; cursor: pointer; margin-top: 2px;
}
.login-btn:active { transform: scale(0.98); }
.login-btn:disabled { opacity: 0.6; cursor: default; }
.login-error { display: none; color: #dc2626; font-size: 0.8rem; margin-top: 12px; }

/* Search / filter */
.toolbar { margin: 10px 0 16px; }
#search {
  width: 100%;
  max-width: 420px;
  font-size: 0.9rem;
  padding: 9px 12px;
  border: 1px solid #d8dadf;
  border-radius: 9px;
  background: #fff;
  color: #111;
  outline: none;
}
#search:focus { border-color: #6366f1; box-shadow: 0 0 0 3px rgba(99,102,241,0.15); }
#search::placeholder { color: #aab; }

.board {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(255px, 1fr));
  gap: 14px;
  align-items: start;
}
.col {
  background: #e4e6ea;
  border-radius: 12px;
  padding: 12px;
  min-height: 140px;
  transition: outline 0.1s, background 0.1s;
}
.col.drop-over { outline: 2px dashed #6366f1; outline-offset: -2px; background: #dde0e6; }
.col-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 11px;
  font-size: 0.76rem;
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.06em;
}
.badge {
  border-radius: 99px;
  padding: 2px 8px;
  font-size: 0.7rem;
  font-weight: 600;
}
#col-todo .col-header     { color: #1d4ed8; }
#col-todo .badge          { background: #dbeafe; color: #1d4ed8; }
#col-completed .col-header{ color: #065f46; }
#col-completed .badge     { background: #d1fae5; color: #065f46; }
#col-notforme .col-header { color: #92400e; }
#col-notforme .badge      { background: #fef3c7; color: #92400e; }

.card {
  background: white;
  border-radius: 8px;
  padding: 11px 12px;
  margin-bottom: 9px;
  box-shadow: 0 1px 2px rgba(0,0,0,0.08);
  transition: box-shadow 0.15s, opacity 0.15s;
}
@media (hover: hover) { .card { cursor: grab; } .card:hover { box-shadow: 0 3px 10px rgba(0,0,0,0.12); } }
.card.dragging { opacity: 0.4; cursor: grabbing; }

.card-title {
  font-size: 0.85rem;
  font-weight: 500;
  line-height: 1.45;
  color: #111;
  margin-bottom: 7px;
}
.card-meta {
  display: flex;
  gap: 8px;
  align-items: center;
  flex-wrap: wrap;
  font-size: 0.71rem;
  color: #999;
  margin-bottom: 8px;
}
.age-chip {
  background: #f3f4f6;
  border-radius: 4px;
  padding: 1px 6px;
  color: #555;
  font-weight: 500;
}
.prompt-toggle {
  font-size: 0.72rem;
  color: #6366f1;
  cursor: pointer;
  user-select: none;
  margin-bottom: 5px;
  display: inline-block;
  padding: 3px 0;
}
.prompt-body {
  display: none;
  background: #fafafa;
  border-left: 3px solid #818cf8;
  border-radius: 0 5px 5px 0;
  padding: 7px 9px;
  font-size: 0.69rem;
  font-family: 'Menlo', 'Consolas', monospace;
  color: #3c3c3c;
  line-height: 1.5;
  white-space: pre-wrap;
  margin-bottom: 8px;
  max-height: 160px;
  overflow-y: auto;
}
.card-actions { display: flex; gap: 6px; flex-wrap: wrap; }
.btn {
  font-size: 0.72rem;
  padding: 6px 10px;
  min-height: 34px;
  border-radius: 6px;
  border: 1px solid #e0e0e0;
  background: white;
  cursor: pointer;
  color: #555;
  white-space: nowrap;
  touch-action: manipulation;
}
.btn:active { transform: scale(0.97); }
@media (hover: hover) { .btn:hover { background: #f5f5f5; } }
.btn-todo { border-color: #93c5fd; color: #1d4ed8; }
.btn-done { border-color: #6ee7b7; color: #065f46; }
.btn-nfm  { border-color: #fcd34d; color: #92400e; }
.btn-copy { border-color: #c4b5fd; color: #5b21b6; }
.btn-copy.copied { background: #ede9fe; }

.empty { color: #b3b6bd; font-size: 0.78rem; text-align: center; padding: 24px 0; }

/* Touch devices: larger tap targets, no drag cursor */
@media (hover: none) {
  .btn { font-size: 0.78rem; padding: 8px 12px; min-height: 40px; }
  .prompt-toggle { font-size: 0.78rem; padding: 5px 0; }
}
</style>
</head>
<body>

<div id="login">
  <form class="login-box" onsubmit="event.preventDefault(); signIn();">
    <div class="login-title">📬 Task Board</div>
    <div class="login-sub">Sign in to view your tasks</div>
    <input id="login-email" type="email" placeholder="Email" autocomplete="username" aria-label="Email">
    <input id="login-pass" type="password" placeholder="Password" autocomplete="current-password" aria-label="Password">
    <button id="login-btn" class="login-btn" type="submit">Sign in</button>
    <div id="login-error" class="login-error"></div>
  </form>
</div>

<div id="app" style="display:none">
  <header>
    <h1>📬 Email Task Board</h1>
    <div class="meta">
      <span id="progress">Loading…</span> · <a href="#" class="signout" onclick="event.preventDefault(); signOut();">Sign out</a>
    </div>
  </header>

  <div class="toolbar">
    <input id="search" type="search" placeholder="🔍 Filter tasks…" autocomplete="off"
           oninput="onSearch(this.value)" aria-label="Filter tasks">
  </div>

  <div class="board">
    <div class="col" id="col-todo"
         ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'todo')">
      <div class="col-header">To Do <span class="badge" id="n-todo">0</span></div>
      <div id="cards-todo"></div>
    </div>
    <div class="col" id="col-completed"
         ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'completed')">
      <div class="col-header">Completed <span class="badge" id="n-completed">0</span></div>
      <div id="cards-completed"></div>
    </div>
    <div class="col" id="col-notforme"
         ondragover="onDragOver(event)" ondragleave="onDragLeave(event)" ondrop="onDrop(event,'notforme')">
      <div class="col-header">Not for Me <span class="badge" id="n-notforme">0</span></div>
      <div id="cards-notforme"></div>
    </div>
  </div>
</div>

<script>
// ── Supabase config ──────────────────────────────────────────────────────────
// The publishable (anon) key is safe to ship to the browser: it grants NO data
// access on its own. Tasks and statuses are protected by Row Level Security and
// require an authenticated session, so this file can live on a public URL with
// no task data baked into it.
const SB_URL    = 'https://dsvkaqahhbsyvkcivitt.supabase.co';
const SB_ANON   = 'sb_publishable_iLSv8HfFT2XClquYoAHMZw_K1U2eyFW';
const SB_TASKS  = 'jhan_tasks';
const SB_STATUS = 'jhan_kanban_status';
const LS_SESSION = 'jhan_session';

let TASKS = [];
let STATUSES = {};
let filterText = '';

// ── Session (access + refresh token) stored per device ───────────────────────
function getSession() {
  try { return JSON.parse(localStorage.getItem(LS_SESSION) || 'null'); } catch { return null; }
}
function saveSession(s) {
  localStorage.setItem(LS_SESSION, JSON.stringify({
    access_token: s.access_token,
    refresh_token: s.refresh_token,
    expires_at: s.expires_at || (Math.floor(Date.now() / 1000) + (s.expires_in || 3600))
  }));
}
function clearSession() { localStorage.removeItem(LS_SESSION); }

async function refreshSession() {
  const s = getSession();
  if (!s || !s.refresh_token) return false;
  try {
    const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=refresh_token`, {
      method: 'POST',
      headers: { apikey: SB_ANON, 'Content-Type': 'application/json' },
      body: JSON.stringify({ refresh_token: s.refresh_token })
    });
    if (!r.ok) return false;
    const data = await r.json();
    if (!data.access_token) return false;
    saveSession(data);
    return true;
  } catch { return false; }
}

// fetch against Supabase REST with auth; auto-refresh once on 401
async function authFetch(path, opts = {}, retry = true) {
  const s = getSession();
  const headers = Object.assign({ apikey: SB_ANON }, opts.headers || {});
  if (s && s.access_token) headers.Authorization = 'Bearer ' + s.access_token;
  const r = await fetch(`${SB_URL}${path}`, Object.assign({}, opts, { headers }));
  if (r.status === 401 && retry && await refreshSession()) {
    return authFetch(path, opts, false);
  }
  return r;
}

// ── Auth actions ─────────────────────────────────────────────────────────────
async function signIn() {
  const email = document.getElementById('login-email').value.trim();
  const pass  = document.getElementById('login-pass').value;
  const errEl = document.getElementById('login-error');
  const btn   = document.getElementById('login-btn');
  errEl.style.display = 'none';
  btn.disabled = true; btn.textContent = 'Signing in…';
  try {
    const r = await fetch(`${SB_URL}/auth/v1/token?grant_type=password`, {
      method: 'POST',
      headers: { apikey: SB_ANON, 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password: pass })
    });
    const data = await r.json();
    if (!r.ok || !data.access_token) throw new Error(data.error_description || data.msg || 'Sign-in failed');
    saveSession(data);
    showBoard();
    await loadData();
  } catch (e) {
    errEl.textContent = (e && e.message) || 'Sign-in failed';
    errEl.style.display = 'block';
  } finally {
    btn.disabled = false; btn.textContent = 'Sign in';
  }
}

function signOut() {
  const s = getSession();
  if (s && s.access_token) {
    fetch(`${SB_URL}/auth/v1/logout`, {
      method: 'POST',
      headers: { apikey: SB_ANON, Authorization: 'Bearer ' + s.access_token }
    }).catch(() => {});
  }
  clearSession();
  TASKS = []; STATUSES = {};
  showLogin();
}

function showLogin() {
  document.getElementById('login').style.display = 'flex';
  document.getElementById('app').style.display = 'none';
  document.getElementById('login-pass').value = '';
}
function showBoard() {
  document.getElementById('login').style.display = 'none';
  document.getElementById('app').style.display = 'block';
}

// ── Data ─────────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const [tr, sr] = await Promise.all([
      authFetch(`/rest/v1/${SB_TASKS}?select=hash,text,prompt,source,first_seen`),
      authFetch(`/rest/v1/${SB_STATUS}?select=hash,status`)
    ]);
    if (tr.status === 401 || sr.status === 401) { signOut(); return; }
    const tasks = await tr.json();
    const statuses = await sr.json();
    TASKS = (Array.isArray(tasks) ? tasks : []).map(t => ({
      hash: t.hash, text: t.text, prompt: t.prompt, source: t.source, firstSeen: t.first_seen
    }));
    STATUSES = {};
    if (Array.isArray(statuses)) for (const row of statuses) STATUSES[row.hash] = row.status;
    render();
  } catch {
    document.getElementById('progress').textContent = 'Offline — could not load tasks';
  }
}

function setStatus(hash, status) {
  STATUSES[hash] = status;   // optimistic
  render();
  authFetch(`/rest/v1/${SB_STATUS}?on_conflict=hash`, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', Prefer: 'resolution=merge-duplicates' },
    body: JSON.stringify([{ hash, status }])
  }).then(r => { if (r.status === 401) signOut(); }).catch(() => {});
}

// ── Helpers ───────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function daysAgo(iso) {
  if (!iso) return '—';
  const d = Math.floor((Date.now() - new Date(iso).getTime()) / 86400000);
  if (d <= 0) return 'today';
  if (d === 1) return '1 day';
  return d + ' days';
}

// ── Search / filter ───────────────────────────────────────────────────────────
function onSearch(v) { filterText = v.trim().toLowerCase(); render(); }
function matchesFilter(t) {
  if (!filterText) return true;
  return (t.text + ' ' + (t.source || '')).toLowerCase().includes(filterText);
}

// ── Drag & drop (desktop / mouse — touch users use the move buttons) ──────────
let draggingHash = null;
function onDragOver(e) { e.preventDefault(); e.currentTarget.classList.add('drop-over'); }
function onDragLeave(e) { e.currentTarget.classList.remove('drop-over'); }
function onDrop(e, status) {
  e.preventDefault();
  e.currentTarget.classList.remove('drop-over');
  if (draggingHash) { setStatus(draggingHash, status); draggingHash = null; }
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  const cols = { todo: [], completed: [], notforme: [] };
  let totalDone = 0;

  for (const t of TASKS) {
    const status = cols[STATUSES[t.hash]] ? STATUSES[t.hash] : 'todo';
    if (status === 'completed') totalDone++;
    if (matchesFilter(t)) cols[status].push({ ...t, status });
  }

  document.getElementById('progress').textContent = `${totalDone} of ${TASKS.length} done`;

  for (const s of ['todo', 'completed', 'notforme']) {
    const container = document.getElementById('cards-' + s);
    document.getElementById('n-' + s).textContent = cols[s].length;
    if (!cols[s].length) {
      container.innerHTML = `<div class="empty">${filterText ? 'No matches' : 'No tasks'}</div>`;
      continue;
    }
    container.innerHTML = '';
    for (const t of cols[s]) container.appendChild(makeCard(t));
  }
}

function makeCard(t) {
  const div = document.createElement('div');
  div.className = 'card';
  div.draggable = true;
  div.addEventListener('dragstart', () => { draggingHash = t.hash; div.classList.add('dragging'); });
  div.addEventListener('dragend', () => div.classList.remove('dragging'));

  const moveBtns = [
    t.status !== 'todo'      ? `<button class="btn btn-todo" onclick="setStatus('${t.hash}','todo')">↩ To Do</button>` : '',
    t.status !== 'completed' ? `<button class="btn btn-done" onclick="setStatus('${t.hash}','completed')">✓ Done</button>` : '',
    t.status !== 'notforme'  ? `<button class="btn btn-nfm"  onclick="setStatus('${t.hash}','notforme')">✗ Not mine</button>` : '',
    t.prompt                 ? `<button class="btn btn-copy" id="copy-${t.hash}" onclick="copyPrompt('${t.hash}')">⎘ Copy prompt</button>` : ''
  ].join('');

  const promptSection = t.prompt ? `
    <span class="prompt-toggle" onclick="togglePrompt(this)">▶ Claude prompt</span>
    <div class="prompt-body">${esc(t.prompt)}</div>` : '';

  div.innerHTML = `
    <div class="card-title">${esc(t.text)}</div>
    <div class="card-meta">
      <span class="age-chip">⏱ ${daysAgo(t.firstSeen)}</span>
      <span>${esc(t.source || 'email')}</span>
    </div>
    ${promptSection}
    <div class="card-actions">${moveBtns}</div>`;
  return div;
}

function togglePrompt(el) {
  const body = el.nextElementSibling;
  const open = body.style.display === 'block';
  body.style.display = open ? 'none' : 'block';
  el.textContent = (open ? '▶' : '▼') + ' Claude prompt';
}

function copyPrompt(hash) {
  const t = TASKS.find(t => t.hash === hash);
  if (!t || !t.prompt) return;
  navigator.clipboard.writeText(t.prompt).then(() => {
    const btn = document.getElementById('copy-' + hash);
    if (btn) { btn.textContent = '✓ Copied'; btn.classList.add('copied'); setTimeout(() => { btn.textContent = '⎘ Copy prompt'; btn.classList.remove('copied'); }, 1800); }
  }).catch(() => {});
}

// ── Boot ──────────────────────────────────────────────────────────────────────
(async function boot() {
  const s = getSession();
  if (s && s.access_token) {
    const now = Math.floor(Date.now() / 1000);
    if (s.expires_at && s.expires_at < now + 60 && !(await refreshSession())) {
      showLogin(); return;
    }
    showBoard();
    await loadData();
  } else {
    showLogin();
    document.getElementById('login-email').focus();
  }
})();
</script>
</body>
</html>
